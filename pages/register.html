<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MarketPlace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="text-center mb-2">
        <a href="../index.html" class="fw-bold fs-3" style="color:var(--primary);"><i class="fas fa-store-alt"></i> MarketPlace</a>
      </div>
      <h3 class="text-center">Create Account</h3>
      <p class="subtitle text-center">Join thousands of buyers & sellers</p>

      <div id="registerMessage" class="alert d-none"></div>

      <form id="registerForm" novalidate>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control form-control-lg" id="regFirstName" placeholder="First name">
          </div>
          <div class="col-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control form-control-lg" id="regLastName" placeholder="Last name">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control form-control-lg" id="regEmail" placeholder="Enter email">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control form-control-lg" id="regPhone" placeholder="03XX-XXXXXXX">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control form-control-lg" id="regPassword" placeholder="Create password">
            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="#regPassword">
              <i class="far fa-eye"></i>
            </button>
          </div>
          <small class="text-muted">Must be at least 8 characters</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control form-control-lg" id="regConfirmPassword" placeholder="Confirm password">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms">
          <label class="form-check-label small" for="terms">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn btn-post-ad w-100 py-2" style="border-radius:8px;">Create Account</button>
      </form>

      <div class="text-center mt-3 mb-3">
        <span class="text-muted small">or sign up with</span>
      </div>
      <div class="social-login d-flex gap-2">
        <button class="btn flex-fill"><i class="fab fa-google me-2" style="color:#DB4437;"></i> Google</button>
        <button class="btn flex-fill"><i class="fab fa-facebook me-2" style="color:#1877F2;"></i> Facebook</button>
      </div>

      <p class="text-center mt-3 mb-0 small">
        Already have an account? <a href="login.html" class="fw-bold">Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
