<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <title>Register - PakBazaar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="text-center mb-3">
        <a href="../index.html" class="fw-bold fs-3" style="color:var(--primary);"><i class="fas fa-store-alt"></i> PakBazaar</a>
      </div>
      <h3 class="text-center">Create Account</h3>
      <p class="subtitle text-center">Join thousands of buyers & sellers</p>

      <div id="registerMessage" class="alert d-none"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="registerName" placeholder="Enter your full name">
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="registerEmail" placeholder="Enter email address">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="registerPhone" placeholder="03XX-XXXXXXX">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="registerPassword" placeholder="Create a strong password">
            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="#registerPassword" style="border-color:var(--border);">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary-custom w-100 py-2" style="font-size:15px;">Create Account</button>
      </form>

      <p class="text-center mt-3 mb-0 small">
        Already have an account? <a href="login.html" class="fw-bold">Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
