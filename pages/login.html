<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <title>Login - PakBazaar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="text-center mb-3">
        <a href="../index.html" class="fw-bold fs-3" style="color:var(--primary);"><i class="fas fa-store-alt"></i> PakBazaar</a>
      </div>
      <h3 class="text-center">Welcome Back</h3>
      <p class="subtitle text-center">Login to your account to continue</p>

      <div id="loginMessage" class="alert d-none"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email or Phone Number</label>
          <input type="text" class="form-control" id="loginEmail" placeholder="Enter email or phone">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter password">
            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="#loginPassword" style="border-color:var(--border);">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" class="text-decoration-none small" style="font-weight:600;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-primary-custom w-100 py-2" style="font-size:15px;">Login</button>
      </form>

      <div class="text-center mt-3 mb-3">
        <span class="text-muted small">or login with</span>
      </div>
      <div class="social-login d-flex gap-2">
        <button class="btn flex-fill" style="color:#DB4437;"><i class="fab fa-google me-2"></i> Google</button>
        <button class="btn flex-fill" style="color:#1877F2;"><i class="fab fa-facebook me-2"></i> Facebook</button>
      </div>

      <p class="text-center mt-3 mb-0 small">
        Don't have an account? <a href="register.html" class="fw-bold">Register</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
